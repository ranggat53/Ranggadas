<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimCreator AI</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('IMG_20260325_201839.jpg') no-repeat top center fixed;
    background-size: contain;
    height: 100vh;
    color: #fff;
}
.container {
    position: relative;
    width: 100%;
    height: 100%;
}

/* Kolom prompt */
#prompt {
    position: absolute;
    top: 19.5%;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-width: 380px;
    height: 30px;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 16px;
    text-align: center;
    background: rgba(255,255,255,0);
    color: #fff;
    border: none;
}

/* Tombol utama */
button.main-btn {
    position: absolute;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: rgba(255,255,255,0);
    cursor: pointer;
    border: none;
    transition: box-shadow 0.2s, transform 0.1s;
}

/* Efek glow saat tombol ditekan */
button.main-btn:active,
.social-media button:active {
    box-shadow: 0 0 12px 4px rgba(255,255,255,0.6);
    transform: scale(0.95);
}

/* Tombol Generate */
#generate {
    top: 23%;
    left: 52%;
    transform: translateX(-50%);
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

/* Tombol High-Res */
#highres {
    top: 28%;
    left: 52%;
    transform: translateX(-50%);
    width: 60px;
    height: 60px;
    border-radius: 12px;
}

/* Tombol sosial media vertikal di kiri */
.social-media {
    position: absolute;
    top: 36%;
    left: 5%;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Tombol sosial media bulat, transparan */
.social-media button {
    width: 50px;
    height: 50px;
    padding: 0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0);
    color: #fff;
    cursor: pointer;
    border: none;
}

/* Naikkan hanya YouTube & Facebook */
.social-media button.youtube { position: relative; top: -6px; }
.social-media button.facebook { position: relative; top: -6px; }
/* Instagram & TikTok tetap */
.social-media button.instagram,
.social-media button.tiktok { top: 0; }

/* Footer */
footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 12px;
    text-align: center;
    font-size: 14px;
    background: rgba(0,0,0,0.3);
    color: #fff;
}
</style>
</head>
<body>

<div class="container">
    <input type="text" id="prompt" placeholder="Masukkan prompt...">

    <button id="generate" class="main-btn" onclick="generate()"></button>
    <button id="highres" class="main-btn" onclick="highRes()"></button>

    <div class="social-media">
        <button class="youtube" onclick="share('youtube')"></button>
        <button class="facebook" onclick="share('facebook')"></button>
        <button class="instagram" onclick="share('instagram')"></button>
        <button class="tiktok" onclick="share('tiktok')"></button>
    </div>
</div>

<footer>&copy; 2026 RANGGADAS GAMING SOLUTION</footer>

<script>
// Tombol Generate
function generate() {
    let prompt = document.getElementById('prompt').value;
    if (!prompt) {
        alert("Masukkan prompt dulu!");
        return;
    }
    let success = Math.random() < 0.5; // contoh: 50% gagal
    if (success) {
        alert("Generate dijalankan untuk prompt: " + prompt);
        console.log("Generate berhasil:", prompt);
    } else {
        alert("Jika tidak bisa tekan tombol High-Res");
        console.log("Generate gagal, sarankan High-Res:", prompt);
    }
}

// Tombol High-Res → langsung buka Leonardo AI
function highRes() {
    window.open('https://app.leonardo.ai/', '_blank');
}

// Tombol sosial media
function share(platform) {
    let url = window.location.href;
    switch(platform) {
        case 'facebook':
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
            break;
        case 'youtube':
            window.open('https://www.youtube.com/', '_blank');
            break;
        case 'instagram':
            alert("Instagram: arahkan ke profil / copy link");
            break;
        case 'tiktok':
            alert("TikTok: arahkan ke profil / copy link");
            break;
        default:
            alert("Platform tidak dikenali");
    }
}
</script>

</body>
</html>
